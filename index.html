<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash of Knowledge | Academy Royale</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <div id="menu-screen" class="screen">
            <header class="menu-header">
                <div class="trophy-count">🏆 <span id="user-trophies">0</span></div>
                <h1>ACADEMY ROYALE</h1>
            </header>

            <main class="arena-selection">
                <h3>ELIGE TU ARENA</h3>
                <div class="subject-grid">
                    <button class="subject-card active" onclick="selectSubject('Física')">
                        <div class="card-icon">⚡</div>
                        <span>Física</span>
                    </button>
                    <button class="subject-card" onclick="selectSubject('Química')">
                        <div class="card-icon">🧪</div>
                        <span>Química</span>
                    </button>
                    <button class="subject-card" onclick="selectSubject('Historia')">
                        <div class="card-icon">🏛️</div>
                        <span>Historia</span>
                    </button>
                    <button class="subject-card" onclick="selectSubject('Mates')">
                        <div class="card-icon">🔢</div>
                        <span>Mates</span>
                    </button>
                </div>
            </main>

            <footer class="menu-footer">
                <button id="btn-battle" onclick="startBattle()">¡BATALLA!</button>
            </div>
        </div>

        <div id="battle-screen" class="screen hidden">
            <div class="boss-area">
                <div class="health-container">
                    <div class="hp-bar enemy-hp"><div id="enemy-fill"></div></div>
                    <span class="hp-label">BOSS IA</span>
                </div>
                <div id="boss-sprite">👹</div>
            </div>

            <div id="quiz-zone">
                <div class="quiz-bubble">
                    <p id="question-text">Preparando desafío...</p>
                </div>
                <div id="options-container">
                    </div>
            </div>

            <div class="player-area">
                <div id="player-sprite">🛡️</div>
                <div class="health-container">
                    <div class="hp-bar player-hp"><div id="player-fill"></div></div>
                    <span class="hp-label">TÚ (GUERRERO)</span>
                </div>
            </div>
        </div>

        <audio id="bg-music" loop src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/background%20music.mp3"></audio>
        <audio id="sfx-hit" src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/got%20it.mp3"></audio>
    </div>
    <script src="script.js"></script>
</body>
</html>
