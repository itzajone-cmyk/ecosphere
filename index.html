<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoSphere | Academia Viva 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="game-container">
        <header class="hud-top glass-panel">
            <div class="user-profile">
                <div class="avatar-badge">👤</div>
                <div class="user-meta">
                    <span id="player-name" class="vivid-blue">Estudiante_Gaia_01</span>
                    <span id="rank-name" class="vivid-green">Rango: Semilla</span>
                </div>
            </div>
            <div class="game-controls">
                <span id="streak-counter">🔥 0</span>
                <button id="music-toggle" onclick="toggleMusic()">🎵 ON</button>
            </div>
        </header>

        <main id="world-view" class="polluted-world">
            <div id="nature-container"></div>
            <div id="core-companion" class="pulsing-crystal">
                <div id="core-visual">💎</div>
            </div>
            <div class="world-status">
                <p id="env-msg">Ecosistema inerte. Esperando tu conocimiento.</p>
            </div>
        </main>

        <footer class="ai-console glass-panel">
            <div class="xp-progress-container">
                <div id="xp-fill"></div>
                <span id="xp-text">0 / 250 XP (LVL 1)</span>
            </div>
            
            <div class="terminal-body">
                <div id="ai-chat-history">
                    <p class="ai-msg">Soy el Oráculo. Transmite tu tema de estudio para evolucionar el bioma.</p>
                </div>
                <div class="input-group">
                    <textarea id="task-input" placeholder="Escribe aquí el tema que estudiaste hoy... Describe tu problema..."></textarea>
                    <button onclick="handleStudySubmission()" id="btn-transmit">PLANTAR 🌿</button>
                </div>
            </div>
        </footer>
    </div>

    <audio id="bg-music" loop>
        <source src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/background%20music.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfx-success">
        <source src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/got%20it.mp3" type="audio/mpeg">
    </audio>

    <script src="./script.js"></script>
</body>
</html>
