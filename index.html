<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoSphere AI | Bachillerato Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header class="status-panel">
            <div class="stat-box">
                <span class="stat-label">RANGO</span>
                <span id="rank-name" class="stat-value">Semilla</span>
                <span id="rank-icon">🌑</span>
            </div>
            <div class="progress-container">
                <div class="level-info">Nivel <span id="level-num">1</span></div>
                <div class="xp-bar"><div id="xp-fill"></div></div>
                <div id="xp-counter">0 / 250 XP</div>
            </div>
        </header>

        <main id="world-view" class="gray-world">
            <div id="nature-layer"></div>
            <div class="world-label">
                <p id="env-msg">El bioma está inerte. Planta conocimiento.</p>
            </div>
        </main>

        <footer class="ai-console">
            <div class="ai-header">
                <div class="ai-led" id="status-led"></div>
                <h3>ORÁCULO ESTUDIANTIL v2.7</h3>
            </div>
            <div class="input-area">
                <textarea id="task-input" placeholder="¿Qué aprendiste hoy? (Ej: Ley de Newton, Fotosíntesis...)"></textarea>
                <button onclick="processStudy()" id="btn-action">PLANTAR 🌿</button>
            </div>
            <div id="ai-feedback">
                <p id="ai-text">Sistema listo para procesar datos...</p>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
