<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Knowledge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <div class="stats">
                <span id="rank-name">Rango: Bronce</span>
                <span id="trophies">🏆 0</span>
            </div>
        </header>

        <div id="setup-screen">
            <h1>Selecciona tu Batalla</h1>
            <select id="subject-select">
                <option value="fisica">Física</option>
                <option value="quimica">Química</option>
                <option value="matematicas">Matemáticas</option>
                <option value="biologia">Biología</option>
            </select>
            <button onclick="startBattle()">¡BATALLA!</button>
        </div>

        <div id="battle-screen" class="hidden">
            <div id="ia-message" class="bubble">Esperando pregunta...</div>
            <div id="quiz-container">
                <h2 id="question-text">Pregunta</h2>
                <div id="options-container"></div>
            </div>
            <div class="battle-footer">
                <span id="question-count">Pregunta: 1/10</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
